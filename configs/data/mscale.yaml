_target_: src.data.iccad13_mscale.Iccad13MultiScale

data_dir: ./benchmark/ICCAD2013
tile_size_x: ${opc.common.TileSizeX}
tile_size_y: ${opc.common.TileSizeY}
offset_x: ${opc.common.OffsetX}
offset_y: ${opc.common.OffsetY}
start_idx: 1
end_idx: 10
sraf_forbiddens:
  - ${opc.low.SRAF_FORBIDDEN}
  - ${opc.mid.SRAF_FORBIDDEN}
  - ${opc.high.SRAF_FORBIDDEN}
seg_lengths:
  - ${opc.low.SEG_LENGTH}
  - ${opc.mid.SEG_LENGTH}
  - ${opc.high.SEG_LENGTH}
down_scales:
  - ${opc.low.DownScale}
  - ${opc.mid.DownScale}
  - ${opc.high.DownScale}

scale_strs: ["low", "mid", "high"]
